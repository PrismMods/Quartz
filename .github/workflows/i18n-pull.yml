name: i18n pull (quartz-i18n → translations)

# Pulls community translations from quartz-i18n back into the mod and commits them
# straight to main. Runs on a schedule + manual dispatch, so no workflow is needed
# on the i18n side. No PR / review gate — translations land directly.
#
# The languages this repo authors (scripts/i18n_sync.py OWNED_HERE: en-US, ko-KR)
# are NOT pulled — they only flow outward, via i18n-push. Everything else merges in
# additively: translator values win, but a key we have and i18n lacks is kept, never
# deleted. See that script's docstring for the full direction rules.
#
# Security: this job reads the i18n checkout purely as JSON data and runs ONLY this
# repo's validator (scripts/validate_i18n.py). It never executes any script from the
# i18n checkout, so translator-controlled content cannot reach the token. The i18n
# checkout itself is deliberately UNauthenticated (that repo is public).
#
# The commit is pushed with the default github.token, which has contents: write on
# this repo. Note: pushes made with github.token do NOT trigger other workflows
# (e.g. CI). If main has branch protection requiring a PR, the direct push will be
# rejected — allow the bot to push or relax protection for this path.
on:
  schedule:
    - cron: "0 * * * *"    # hourly; adjust or replace with a repository_dispatch trigger for instant sync
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: quartz
      - uses: actions/checkout@v4
        with:
          # No token: Quartz-i18n is public, so the default github.token reads it fine.
          repository: PrismMods/Quartz-i18n
          path: i18n
      - name: Validate incoming translations
        # this repo's validator, run against i18n's data — see security note above
        run: python3 quartz/scripts/validate_i18n.py i18n/Lang quartz/Quartz/Resource/Export/Lang/en-US.json
      - name: Merge translations in (never delete a key)
        # Was a wholesale `cp`, which let a stale i18n erase live strings: its ko-KR
        # lagged this repo by 31 keys, so it proposed deleting 31 Korean strings
        # (2026-07-17). i18n_sync.py merges instead — it starts from our file and only
        # adds or revalues, so a key we have can never be dropped by a sender that
        # simply has not caught up yet. It also skips every language we author
        # (OWNED_HERE), so those only ever flow outward via i18n-push.
        run: python3 quartz/scripts/i18n_sync.py pull i18n/Lang quartz/Quartz/Resource/Export/Lang
      - name: Commit translations to main if changed
        working-directory: quartz
        run: |
          git config user.name "quartz-i18n-bot"
          git config user.email "i18n-bot@users.noreply.github.com"
          git add Quartz/Resource/Export/Lang
          # Hard guard: a pull must never change a language THIS repo authors,
          # whatever the merge step did. Reset each to HEAD in both index and
          # worktree so it can never appear in the sync commit. The list comes from
          # i18n_sync.py's OWNED_HERE so it cannot drift out of step with the merge.
          for code in $(python3 scripts/i18n_sync.py owned); do
            git checkout HEAD -- "Quartz/Resource/Export/Lang/$code.json"
          done
          if git diff --cached --quiet; then
            echo "no translation changes"
            exit 0
          fi
          git commit -m "i18n: sync translations from quartz-i18n"
          # Rebase on any commits that landed since checkout so the push fast-forwards.
          git pull --rebase origin main
          git push origin HEAD:main
